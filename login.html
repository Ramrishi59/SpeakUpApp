<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpeakUpApp - Log In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="bg-shapes" aria-hidden="true">
    <span class="shape shape-a"></span>
    <span class="shape shape-b"></span>
    <span class="shape shape-c"></span>
  </div>

  <main class="login-shell">
    <div class="brand">
      <div class="brand-mark">
        <img src="Images/dashboard thumbnails/Manku.webp" alt="SpeakUp" />
      </div>
      <div class="brand-text">
        <p class="brand-eyebrow">Welcome back to</p>
        <h1>SpeakUp</h1>
      </div>
    </div>

    <section class="login-card" aria-labelledby="login-title">
      <div class="card-header">
        <h2 id="login-title">Log in with magic link</h2>
        <p>Enter your email and we will send you a secure sign-in link.</p>
      </div>

      <form class="login-form" action="#" method="post">
        <label for="email">Email address</label>
        <input
          id="email"
          name="email"
          type="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
        <button type="submit">Continue</button>
      </form>
    </section>

    <p class="footer-note">No password needed. Check your inbox for the link.</p>
  </main>
</body>
</html>

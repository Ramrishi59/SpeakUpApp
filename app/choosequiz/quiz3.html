<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#007bff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="SpeakUpApp" />
  <title>Speak Up — 3-Option Image Quiz</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../Images/Unit1/manku-icon-192.png" />

  <link rel="stylesheet" href="quiz3.css?v=45">
</head>

<body>
  <header id="quizTopbar" class="topbar hidden">
    <div class="build-tag">v45</div>
    <button id="jumpResultsBtn" class="jump-results-btn" type="button">Finish</button>
    <img class="manku-avatar" src="../Images/dashboard thumbnails/Manku.webp" alt="Manku" />
    <div id="activityTitle" class="activity-title">Tap the right one</div>
    <div id="question" class="question">
      What is shown?
    </div>
    <div id="progressPill" class="pill hidden">1/3</div>
  </header>

  <main id="app">

    <!-- INTRO CARD -->
    <section id="introScreen" class="card intro-card" aria-live="polite">
      <div class="intro-hero">
        <div class="build-tag intro-build-tag">v45</div>
        <img class="intro-avatar" src="../Images/dashboard thumbnails/Manku.webp" alt="Manku" />
      </div>

      <div class="intro-image-wrap">
        <img id="introImage" src="Images/title1.webp?v=45" alt="Tap the right one" />
      </div>

      <!-- Intro audio: Manku saying the lines -->
      <audio id="introAudio" preload="auto">
        <source src="Audio/intro/intro2.mp3?v=45" type="audio/mpeg" />
      </audio>

      <div class="intro-actions">
        <a id="introHomeBtn" class="activity-home" href="../dashboard.html" aria-label="Home">
          <span>Home</span>
        </a>
        <button id="startBtn" class="btn primary">Let’s start!</button>
        <button id="skipBtn" class="btn secondary">Skip Intro</button>
      </div>
    </section>

    <!-- MAIN CARD -->
    <section id="quizCard" class="card hidden" aria-live="polite">
      <div class="image-wrap">
        <img id="itemImage" alt="" />
      </div>

      <div class="choices" role="group" aria-label="Answer choices">
        <button id="c0" class="choice-btn">Choice 1</button>
        <button id="c1" class="choice-btn">Choice 2</button>
        <button id="c2" class="choice-btn">Choice 3</button>
      </div>


      <div class="nav-row">
        <button id="prevBtn" class="btn secondary">Prev</button>
        <a id="homeBtn" class="activity-home" href="../dashboard.html" aria-label="Home">
          <span>Home</span>
        </a>
        <button id="nextBtn" class="btn primary">Next</button>
        <button id="resetBtn" class="btn danger">Start Over</button>
      </div>
    </section>


    <!-- RESULTS SCREEN -->
    <section id="resultsOverlay" class="overlay results-card hidden" role="dialog" aria-modal="true" aria-label="Quiz results">
      <div class="results-hero">
        <div class="build-tag results-build-tag">v45</div>
        <img class="intro-avatar" src="../Images/dashboard thumbnails/Manku.webp" alt="Manku" />
      </div>

      <div class="results-image-wrap">
        <img id="resultsImage" src="../order-activity/Images/score.webp" alt="">
        <div id="resultsScore" class="results-score" aria-live="polite"></div>
      </div>

      <div class="results-actions">
        <button id="reviewBtn" class="btn secondary results-review" type="button" aria-label="Review Answers">
          Review Answers
        </button>
        <button id="restartBtn" class="activity-home results-home" type="button" aria-label="Go Home">
          <span>Go Home</span>
        </button>
        <button id="resultsResetBtn" class="btn danger results-reset" type="button" aria-label="Start Over">
          Start Over
        </button>
      </div>
    </section>
  </main>

  <!-- Confetti canvas -->
  <canvas id="confettiCanvas" class="confetti-layer"></canvas>

  <script type="module" src="../auth-firebase.js?v=7"></script>
  <script type="module" src="../access-guard.js?v=1"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js">
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const intro = document.getElementById("introScreen");
      const quizCard = document.getElementById("quizCard");
      const startBtn = document.getElementById("startBtn");
      const skipBtn = document.getElementById("skipBtn");
      const progressPill = document.getElementById("progressPill");
      const quizTopbar = document.getElementById("quizTopbar");
      const introAudio = document.getElementById("introAudio");

      if (!intro || !quizCard || !startBtn) return;

      function goToQuiz() {
        // Safety: stop audio if still playing
        if (introAudio) {
          introAudio.pause();
          introAudio.currentTime = 0;
        }
        intro.classList.add("hidden");
        quizCard.classList.remove("hidden");
        quizTopbar?.classList.remove("hidden");

        // 👇 VERY IMPORTANT: re-render first question *after* intro,
        // so the question audio plays with a user gesture context
        if (typeof render === "function") {
          idx = 0;        // reset, just to be safe
          score = 0;
          render(idx);
        }
      }


      startBtn.addEventListener("click", () => {
        // Disable button so they don't spam it
        startBtn.disabled = true;

        if (introAudio) {
          introAudio.currentTime = 0;
          introAudio.play()
            .then(() => {
              // When audio finishes, go to quiz
              introAudio.addEventListener("ended", goToQuiz, { once: true });
            })
            .catch(() => {
              // If autoplay fails (browser block etc.), just go straight to quiz
              goToQuiz();
            });
        } else {
          goToQuiz();
        }
      });

      skipBtn?.addEventListener("click", () => {
        startBtn.disabled = true;
        skipBtn.disabled = true;
        goToQuiz();
      });
    });
  </script>

  <script src="quiz3.js?v=45" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        const isLocalDev = ["localhost", "127.0.0.1", ""].includes(location.hostname);

        try {
          if (isLocalDev) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map(registration => registration.unregister()));

            if ("caches" in window) {
              const cacheNames = await caches.keys();
              await Promise.all(
                cacheNames
                  .filter(name => name.startsWith("speakupapp-cache-"))
                  .map(name => caches.delete(name))
              );
            }
            return;
          }

          await navigator.serviceWorker.register('../service-worker.js');
        } catch (error) {
          console.error('Service Worker registration failed:', error);
        }
      });
    }
  </script>
</body>

</html>

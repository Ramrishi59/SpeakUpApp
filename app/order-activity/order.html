<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="format-detection" content="telephone=no" />
  <title>Speak Up — 4-Word Order Game</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="order.css?v=6">
</head>

<body>
  <header class="topbar">
    <a id="homeBtn" class="activity-home" href="../dashboard.html" aria-label="Home">
      <span>Home</span>
    </a>
    <div class="progress-wrap" aria-label="Progress">
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div id="progressPill" class="pill hidden">1/3</div>
      <div id="progressStats" class="progress-stats">0 correct so far</div>
    </div>
    <button id="resetBtn" class="activity-replay" type="button" aria-label="Start over">
      <span>Start Over</span>
    </button>
  </header>

  <main id="app">
    <!-- INTRO CARD -->
    <section id="introScreen" class="card intro-card" aria-live="polite">
      <div class="intro-image-wrap">
        <img id="introImage" src="Images/mixandfix.webp?v=2" alt="Mix and Fix" />
      </div>

      <audio id="introAudio" preload="auto">
        <source src="Audio/intro/intro.mp3" type="audio/mpeg" />
      </audio>

      <div class="intro-actions">
        <button id="startBtn" class="start-img-btn"><img src="Images/letsstart.webp" alt="Let's start!" /></button>
      </div>
    </section>

    <!-- MAIN CARD -->
    <section id="quizCard" class="card hidden" aria-live="polite">
      <img id="mankuCorner" class="manku-corner" src="Images/28.webp" alt="Manku pointing to the sentence">

      <!-- Built sentence preview -->
      <div id="answerSlot" class="answer-slot" aria-live="polite">
        <span id="answerText"></span>
      </div>

      <!-- Word boxes -->
      <div class="word-grid" role="group" aria-label="Tap the words in order"></div>

      <img class="student-helper" src="Images/27.webp" alt="" aria-hidden="true">

      <div class="nav-row">
        <button id="prevBtn" class="btn secondary">Prev</button>
        <button id="nextBtn" class="btn primary">Next</button>
      </div>
    </section>

    <!-- RESULTS OVERLAY -->
    <section id="resultsOverlay" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="resultsTitle">
      <div class="overlay-bg" aria-hidden="true">
        <img id="resultsImage" src="Images/score.webp" alt="">
      </div>
      <div id="resultsScore" class="results-score" aria-live="polite"></div>
      <div class="overlay-card">
      </div>
      <div class="nav-row overlay-nav">
       
        <button id="restartBtn" class="start-img-btn results-keep-going"><img src="Images/keepgoing.webp" alt="Keep going" /></button>
      </div>
    </section>
  </main>

  <canvas id="confettiCanvas" class="confetti-layer"></canvas>

  <script type="module" src="../auth-firebase.js?v=7"></script>
  <script type="module" src="../access-guard.js?v=2"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <!-- INTRO HAND-OFF -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const intro = document.getElementById("introScreen");
      const quizCard = document.getElementById("quizCard");
      const startBtn = document.getElementById("startBtn");
      const progressPill = document.getElementById("progressPill");
      const introAudio = document.getElementById("introAudio");
      const sharedIntroAudio = "Audio/intro/intro.mp3";

      if (!intro || !quizCard || !startBtn) return;

      function goToQuiz() {
        if (introAudio) {
          introAudio.pause();
          introAudio.currentTime = 0;
        }
        document.body.classList.add("quiz-active");
        intro.classList.add("hidden");
        quizCard.classList.remove("hidden");
        if (progressPill) {
          progressPill.classList.remove("hidden");
        }

        if (typeof render === "function") {
          idx = 0;
          score = 0;
          render(idx);
        }
      }

      startBtn.addEventListener("click", () => {
        startBtn.disabled = true;

        if (introAudio) {
          introAudio.pause();
          introAudio.src = sharedIntroAudio;
          introAudio.currentTime = 0;
          introAudio.load();
          introAudio.addEventListener("ended", goToQuiz, { once: true });
          introAudio.play()
            .then(() => {})
            .catch(() => {
              goToQuiz();
            });
        } else {
          goToQuiz();
        }
      });

    });
  </script>

  <script src="order.js?v=3" defer></script>
</body>

</html>

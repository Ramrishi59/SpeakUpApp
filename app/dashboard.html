<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakUpApp - Learn English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=7">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="SpeakUpApp">
    <link rel="apple-touch-icon" href="Images/Unit1/manku-icon-192.png">
</head>
<body>

    <div id="app-container">
        <header class="app-header">
            <div class="menu-icon">☰</div>
            <div class="header-title">Lessons</div>
            <div class="notification-icon"></div> </header>

        <main id="appRoot" class="main-content">
            <div id="dashboard-screen">
                <section class="dashboard-hero" aria-label="Dashboard overview">
                  <div class="dashboard-hero-copy">
                    <p class="dashboard-eyebrow" id="dashboard-greeting">Hello! 👋</p>
                    <p class="hero-brand-line">RAMESHVOICE SPEAKUP INTERACTIVE</p>
                    <h1>Speak English<br>Step by Step</h1>
                    <p>Look • Listen • Repeat<br>Speak with Confidence</p>
                    <div class="hero-progress-ring-row">
                      <div class="hero-ring-wrap">
                        <svg class="hero-ring" viewBox="0 0 44 44" aria-hidden="true">
                          <circle class="hero-ring-bg" cx="22" cy="22" r="18" />
                          <circle class="hero-ring-fill" id="hero-ring-fill" cx="22" cy="22" r="18" />
                        </svg>
                        <span class="hero-ring-label">Overall Progress</span>
                        <span class="hero-ring-pct" id="hero-ring-pct">0%</span>
                      </div>
                    </div>
                  </div>
                  <img src="Images/dashboard thumbnails/Manku.webp"
                       alt="" class="dashboard-hero-character" aria-hidden="true">
                </section>

                <div id="category-tiles"></div>

                <div id="back-to-categories" class="category-back-row hidden">
                    <button type="button" class="category-back-btn" aria-label="Back to categories">&#8249; Categories</button>
                </div>

                <div id="continue-card-slot"></div>

                <div class="lessons-list">
                    </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-button active" data-nav-target="lessons">
                <img src="Images/buttons/10.webp" alt="Lessons">
                <span>Lessons</span>
            </button>
            <button class="nav-button" data-nav-target="login">
                <img src="Images/dashboard thumbnails/Manku.webp" alt="Log in">
                <span>Log in</span>
            </button>
            <button class="nav-button" data-nav-target="admin" hidden>
                <img src="Images/dashboard thumbnails/Manku.webp" alt="Admin">
                <span>Admin</span>
            </button>
        </nav>
    </div>

    <script type="module" src="./auth-firebase.js?v=10"></script>
    <script>
      window.addEventListener("load", async () => {
        if (!window.SUAuth?.ready) return;
        try {
          await window.SUAuth.ready;
        } catch (error) {
          console.error("SUAuth ready failed", error);
        }
        if (window.SUAuth?.getDeviceBlocked?.() === true) {
          document.body.innerHTML = `
            <main style="min-height:100svh;display:grid;place-items:center;padding:24px;font-family:Fredoka,system-ui,sans-serif;background:#fff7ed;color:#312015;text-align:center;">
              <section style="width:min(440px,100%);background:#fff;border:2px solid #f4c18f;border-radius:18px;padding:28px;box-shadow:0 16px 40px rgba(92,52,18,.16);">
                <h1 style="margin:0 0 10px;font-size:clamp(26px,7vw,38px);">Already in use on another device</h1>
                <p style="margin:0 0 22px;font-size:17px;line-height:1.5;">This SpeakUp account is locked to one device. If you have changed or lost your phone, message us on WhatsApp and we will reset it for you.</p>
                <a href="https://wa.me/916282405919?text=Hi%2C%20I%20need%20to%20reset%20my%20SpeakUp%20device%20lock." style="display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 22px;border-radius:999px;background:#25D366;color:#fff;text-decoration:none;font-weight:700;">Message us on WhatsApp</a>
              </section>
            </main>
          `;
        }
      });
    </script>
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
    <script src="./payment-config.js?v=2"></script>
    <script src="./script.js?v=10"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          const isLocalDev = ["localhost", "127.0.0.1", ""].includes(location.hostname);

          try {
            if (isLocalDev) {
              const registrations = await navigator.serviceWorker.getRegistrations();
              await Promise.all(registrations.map(registration => registration.unregister()));

              if ("caches" in window) {
                const cacheNames = await caches.keys();
                await Promise.all(
                  cacheNames
                    .filter(name => name.startsWith("speakupapp-cache-"))
                    .map(name => caches.delete(name))
                );
              }
              return;
            }

            const registration = await navigator.serviceWorker.register('./service-worker.js');

            // Keep checking for a newer deployed version while this tab stays open.
            setInterval(() => registration.update(), 60 * 1000);

            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              if (!newWorker) return;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'activated') {
                  showUpdateBanner();
                }
              });
            });

            let refreshed = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
              if (refreshed) return;
              refreshed = true;
              showUpdateBanner();
            });

            showAppVersion(registration);
          } catch (error) {
            console.error('Service Worker registration failed:', error);
          }
        });
      }

      function showUpdateBanner() {
        if (document.getElementById('suUpdateBanner')) return;
        const banner = document.createElement('div');
        banner.id = 'suUpdateBanner';
        banner.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:9999;display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 18px;background:#ff7a59;color:#fff;font-family:Fredoka,system-ui,sans-serif;font-weight:700;box-shadow:0 -4px 16px rgba(0,0,0,.15);';
        banner.innerHTML = '<span>New update available</span>';
        const btn = document.createElement('button');
        btn.textContent = 'Tap to refresh';
        btn.style.cssText = 'background:#fff;color:#ff7a59;border:none;border-radius:999px;padding:8px 18px;font-weight:700;font-family:inherit;cursor:pointer;';
        btn.addEventListener('click', () => window.location.reload());
        banner.appendChild(btn);
        document.body.appendChild(banner);
      }

      function showAppVersion(registration) {
        const sw = registration.active;
        if (!sw) return;
        const channel = new MessageChannel();
        channel.port1.onmessage = (event) => {
          const version = event.data?.version;
          if (!version) return;
          const el = document.createElement('p');
          el.id = 'suAppVersion';
          el.textContent = version;
          el.style.cssText = 'text-align:center;font-size:11px;color:#b8a68e;padding:6px 0 14px;';
          document.body.appendChild(el);
        };
        sw.postMessage({ type: 'GET_VERSION' }, [channel.port2]);
      }
    </script>
</body>
</html>

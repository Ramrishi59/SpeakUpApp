<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakUpApp - Learn English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="SpeakUpApp">
    <link rel="apple-touch-icon" href="Images/Unit1/manku-icon-192.png">
</head>
<body>

    <div id="app-container">
        <header class="app-header">
            <div class="menu-icon">☰</div>
            <div class="header-title">Lessons</div>
            <div class="notification-icon"></div> </header>

        <main id="appRoot" class="main-content">
            <div id="dashboard-screen">
                <section class="dashboard-hero" aria-label="Dashboard overview">
                    <div class="dashboard-hero-copy">
                        <p class="dashboard-eyebrow">SpeakUp lessons</p>
                        <h1>Learn English step by step</h1>
                        <p>Learn, listen, practise, and come back to where you stopped.</p>
                    </div>
                    <img src="Images/dashboard thumbnails/Manku.webp" alt="" class="dashboard-hero-character" aria-hidden="true">
                </section>

                <div class="options-section">
                    <div class="dashboard-progress-summary" aria-live="polite">
                        <span><strong id="total-count">0</strong> lessons</span>
                        <span><strong id="completed-count">0</strong> completed</span>
                        <span><strong id="in-progress-count">0</strong> in progress</span>
                    </div>
                    <div class="search-bar">
                        <input type="text" placeholder="Search" class="search-input">
                        <span class="search-icon">🔍</span>
                    </div>
                    <div class="dashboard-filter-row" aria-label="Lesson filters"></div>
                    <button class="refresh-button" type="button">Refresh</button>
                </div>

                <div class="lessons-list">
                    </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-button active" data-nav-target="lessons">
                <img src="Images/buttons/27.png" alt="Lessons">
                <span>Lessons</span>
            </button>
            <button class="nav-button" data-nav-target="login">
                <img src="Images/buttons/startover.png" alt="Log in">
                <span>Log in</span>
            </button>
            <button class="nav-button" data-nav-target="new-screen">
                <img src="Images/buttons/25.png" alt="New Screen">
                <span>New Screen</span>
            </button>
        </nav>
    </div>

    <script type="module" src="./auth-firebase.js?v=6"></script>
    <script>
      window.addEventListener("load", async () => {
        if (!window.SUAuth?.ready) return;
        try {
          await window.SUAuth.ready;
        } catch (error) {
          console.error("SUAuth ready failed", error);
        }
      });
    </script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="./payment-config.js?v=2"></script>
    <script src="./script.js?v=4"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            await navigator.serviceWorker.register('./service-worker.js');
          } catch (error) {
            console.error('Service Worker registration failed:', error);
          }
        });
      }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakUpApp - Learn English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="app-container">
        <header class="app-header">
            <div class="menu-icon">☰</div>
            <div class="header-title">Lessons</div>
            <div class="notification-icon"></div> </header>

        <main id="appRoot" class="main-content">
            <div id="dashboard-screen">
                <div class="options-section">
                    <h2>Choose a Lesson</h2>
                    <div class="dashboard-progress-summary" aria-live="polite">
                        <span><strong id="completed-count">0</strong> completed</span>
                        <span><strong id="in-progress-count">0</strong> in progress</span>
                    </div>
                    <div class="search-bar">
                        <input type="text" placeholder="Search" class="search-input">
                        <span class="search-icon">🔍</span>
                    </div>
                    <button class="refresh-button" type="button">Refresh</button>
                </div>

                <div class="lessons-list">
                    </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-button active" data-nav-target="lessons">
                <img src="Images/buttons/27.png" alt="Lessons">
                <span>Lessons</span>
            </button>
            <button class="nav-button" data-nav-target="login">
                <img src="Images/buttons/startover.png" alt="Log in">
                <span>Log in</span>
            </button>
            <button class="nav-button" data-nav-target="new-screen">
                <img src="Images/buttons/25.png" alt="New Screen">
                <span>New Screen</span>
            </button>
        </nav>
    </div>

    <script type="module" src="./auth-firebase.js?v=1"></script>
    <script>
      window.addEventListener("load", async () => {
        if (!window.SUAuth?.ready) return;
        try {
          await window.SUAuth.ready;
        } catch (error) {
          console.error("SUAuth ready failed", error);
        }
      });
    </script>
    <script src="./script.js?v=1"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));

            if (window.caches?.keys) {
              const cacheKeys = await caches.keys();
              await Promise.all(cacheKeys.map((key) => caches.delete(key)));
            }
          } catch (error) {
            console.error('Service Worker cleanup failed:', error);
          }
        });
      }
    </script>
</body>
</html>

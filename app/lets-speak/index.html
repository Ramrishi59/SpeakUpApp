<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#79c1ea" />
  <title>Let's Speak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../Images/Unit1/manku-icon-192.png" />
  <link rel="stylesheet" href="lets-speak.css?v=34" />
</head>

<body>
  <main class="lets-speak-app" aria-live="polite">
    <section class="activity-shell">
      <header class="hero-panel" data-scene="intro">
        <div class="build-tag">v34</div>
        <img class="manku-avatar" src="../Images/dashboard thumbnails/Manku.webp" alt="Manku" />
        <h1 id="promptText" class="prompt-text">Hey! I'm Manku! Come on, let's talk together!</h1>
      </header>

      <section class="practice-panel">
        <div class="art-card" data-mode="title-card">
          <img id="sceneImage" class="scene-image" src="Images/title.png" alt="Let's Talk" />
        </div>

        <div class="mic-slot">
          <button id="micBtn" class="mic-button" type="button" aria-label="Speak">
            <span class="mic-shadow" aria-hidden="true"></span>
            <span class="mic-face" aria-hidden="true">
              <img class="mic-icon-image" src="Images/mic.webp" alt="" />
            </span>
          </button>
        </div>

        <div class="status-strip">
          <span id="listenDot" class="listen-dot"></span>
          <span id="statusText">Tap the mic</span>
        </div>

        <p class="heard-line"><span>Heard:</span> <strong id="heardText">Nothing yet</strong></p>
      </section>

      <nav class="bottom-bar" aria-label="Activity controls">
        <a class="nav-icon home-icon" href="../dashboard.html" aria-label="Go home">
          <img class="nav-icon-image" src="../Images/buttons/27.png" alt="" />
        </a>
        <button id="replayBtn" class="nav-icon replay-icon" type="button" aria-label="Replay">
          <img class="nav-icon-image" src="../Images/buttons/28.png" alt="" />
        </button>
      </nav>
    </section>
  </main>

  <script src="lets-speak.js?v=15" defer></script>
</body>

</html>

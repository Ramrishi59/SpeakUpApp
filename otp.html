<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpeakUpApp - Enter OTP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="bg-shapes" aria-hidden="true">
    <span class="shape shape-a"></span>
    <span class="shape shape-b"></span>
    <span class="shape shape-c"></span>
  </div>

  <main class="login-shell">
    <div class="brand">
      <div class="brand-mark">
        <img src="Images/dashboard thumbnails/Manku.webp" alt="SpeakUp" />
      </div>
      <div class="brand-text">
        <p class="brand-eyebrow">Verify</p>
        <h1>SpeakUp</h1>
      </div>
    </div>

    <section class="login-card" aria-labelledby="otp-title">
      <div class="card-header">
        <h2 id="otp-title">Enter the OTP</h2>
        <p>We sent a 6-digit code to your phone number.</p>
      </div>

      <form class="login-form" action="#" method="post">
        <label for="otp">One-time password</label>
        <input
          id="otp"
          name="otp"
          type="text"
          inputmode="numeric"
          pattern="[0-9]{6}"
          maxlength="6"
          placeholder="123456"
          autocomplete="one-time-code"
          required
        />
        <button type="submit">Verify</button>
      </form>
    </section>

    <p class="footer-note">Didn't get it? Resend in 30 seconds.</p>
  </main>

  <nav class="bottom-nav">
    <button class="nav-button" data-nav-target="lessons">
      <img src="Images/Unit1/icon.png" alt="Lessons" />
      <span>Lessons</span>
    </button>
    <button class="nav-button active" data-nav-target="login">
      <img src="Images/Unit1/icon.png" alt="Log in" />
      <span>Log in</span>
    </button>
    <button class="nav-button" data-nav-target="new-screen">
      <img src="Images/Unit1/icon.png" alt="New Screen" />
      <span>New Screen</span>
    </button>
  </nav>

  <script>
    document.querySelectorAll('.bottom-nav .nav-button').forEach((btn) => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.navTarget;
        if (target === 'lessons') {
          window.location.href = 'index.html';
        } else if (target === 'login') {
          window.location.href = 'login.html';
        } else {
          alert(`The "${target.charAt(0).toUpperCase() + target.slice(1)}" section is not yet implemented.`);
        }
      });
    });
  </script>
</body>
</html>
